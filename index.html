<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Media streaming platform">
    <title>Video Player - MyApp39</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Trebuchet MS', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #DE6262 0%, #FFB88C 100%);
            
            color: #333;
            line-height: 1.6;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            flex: 1;
        }
        header {
            background: linear-gradient(135deg, #DE6262, #FFB88C);
            color: white;
            padding: 30px;
            margin-bottom: 30px;
            border-radius: 10px;
        }
        h1 { font-size: 2.5em; margin-bottom: 10px; }
        .tagline { font-size: 1.2em; opacity: 0.95; }
        .badge {
            display: inline-block;
            background: #FFB88C;
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            margin: 5px;
            font-size: 0.9em;
            font-weight: 600;
        }
        .features {
            margin: 30px 0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }
        .feature {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #DE6262;
            transition: transform 0.3s;
        }
        .feature:hover { transform: translateY(-5px); }
        .feature strong { color: #DE6262; display: block; margin-bottom: 8px; }
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        .stat {
            text-align: center;
            padding: 15px;
            min-width: 120px;
        }
        .stat-value { font-size: 2em; font-weight: bold; color: #DE6262; }
        .stat-label { color: #636e72; font-size: 0.9em; }
        footer {
            margin-top: 40px;
            padding: 20px;
            text-align: center;
            color: #636e72;
            border-top: 2px solid #f0f0f0;
        }
        @media (max-width: 768px) {
            h1 { font-size: 1.8em; }
            .features { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 Video Player</h1>
            <p class="tagline">Media streaming platform</p>
        </header>
        
        <div>
            <span class="badge">v1.3.9</span>
            <span class="badge">ID: EYW8X9U7</span>
            <span class="badge">Build: 3972</span>
        </div>
        
        <div class="features">
            <div class="feature"><strong>✓</strong> SEO Optimized</div><div class="feature"><strong>✓</strong> Social Sharing</div><div class="feature"><strong>✓</strong> Comment System</div><div class="feature"><strong>✓</strong> RSS Feeds</div>
        </div>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-value">201+</div>
                <div class="stat-label">Users</div>
            </div>
            <div class="stat">
                <div class="stat-value">301</div>
                <div class="stat-label">Downloads</div>
            </div>
            <div class="stat">
                <div class="stat-value">160</div>
                <div class="stat-label">Stars</div>
            </div>
        </div>
        
        <footer>
            <p>&copy; 2026 MyApp39. All rights reserved.</p>
            <p style="margin-top: 10px; font-size: 0.85em;">Built with ❤️ by dilshodsattar26-arch</p>
            <p style="margin-top: 5px; font-size: 0.8em; color: #b2bec3;">#EYW8X9U7</p>
        </footer>
    </div>
</body>
</html>
